name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make test

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make tarball
      - uses: actions/upload-artifact@v4
        with:
          name: KoboRoot
          path: build/KoboRoot.tgz
