# Readeck server
URL   = "https://example.com/readeck"
Token = ""

# Where to store downloaded EPUB files
Output = "/mnt/onboard/readeckobo"

# Path to the Kobo Nickel SQLite database (for read-status sync)
Database = "/mnt/onboard/.kobo/KoboReader.sqlite"

# Number of articles to fetch (-1 = all)
Limit = -1

# Number of parallel downloads
Workers = 2

# HTTP request timeout in seconds
Timeout = 300

# Delete local EPUBs that are no longer in the unread feed
Delete = false

# Only sync articles with these labels (comma-separated, empty = all)
Labels = ""

# Path to a log file (empty = stdout only), rotated automatically
Log = ""

# Path to a PID file to prevent concurrent runs (empty = auto)
PIDFile = ""

# Command to run when files have changed (empty = none)
PostSync = ""

# Extra debug logging (prints Bearer token — keep off in production)
Debug = false
