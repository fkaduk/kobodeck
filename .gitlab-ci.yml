image: golang:latest

stages:
    - lint
    - build

format:
    stage: lint
    script:
        - go get github.com/golang/lint/golint
        - make lint

compile:
    stage: build
    # XXX: those dependencies should be automatically fetched...
    script:
        - go get github.com/Strubbl/wallabago
        - go get github.com/nightlyone/lockfile
        - make build
        - make tarball
    artifacts:
        paths:
        - build/
        when: always
