image: golang:latest

# The problem is that to be able to use go get, one needs to put
# the repository in the $GOPATH. So for example if your gitlab domain
# is mydomainperso.com, and that your repository is repos/projectname, and
# the default GOPATH being /go, then you'd need to have your
# repository in /go/src/mydomainperso.com/repos/projectname 
# Thus, making a symbolic link corrects this.
#
# here we install dep by hand from binary packages, but starting from
# Debian buster, it's part of the official repos so we should switch
# when "latest" is "buster"
before_script:
    - mkdir -p /go/src
    - ln -s /builds /go/src/gitlab.com
    - cd /go/src/gitlab.com/$CI_PROJECT_PATH
    - go get github.com/golang/lint/golint
    - curl -L -s https://github.com/golang/dep/releases/download/v0.4.1/dep-linux-amd64 -o /usr/local/bin/dep
    - chmod +x /usr/local/bin/dep
    - apt-get update
    - apt-get install -y -q gcc-arm-linux-gnueabihf

stages:
    - build

compile:
    stage: build
    script:
        - make lint
        - dep ensure
        - go get
        - make build
        - make tarball
    artifacts:
        paths:
        - build/
        when: always
