image: golang:latest

stages:
    - lint
    - build

format:
    stage: lint
    script:
        - go get github.com/golang/lint/golint
        - make lint

compile:
    stage: build
    script:
        - go get github.com/Strubbl/wallabago
        - GOARCH=arm make build
        - mv wallabako wallabako.arm
        - make build
        - mv wallabako wallabako.$(arch)
    artifacts:
        untracked: true
        when: always
