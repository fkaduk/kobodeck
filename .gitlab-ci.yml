image: golang:latest

stages:
    - lint
    - build

format:
    stage: lint
    script:
        - go get github.com/golang/lint/golint
        - make lint

compile:
    stage: build
    script:
        - go get github.com/Strubbl/wallabago
        - go get github.com/anarcat/wallabago
        - GOARM=7 GOARCH=arm make build
        - mv wallabako wallabako.arm7
        - make build
    artifacts:
        untracked: true
        when: always
