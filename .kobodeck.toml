[Server]
URL = "https://readeck.com"
# Obtain this from your Readeck instance
Token = ""
# HTTP request timeout in seconds
Timeout = 30

[Fetch]
# Number of parallel article downloads
Workers = 2
# Number of articles to fetch (0 = all)
Limit = 0
# Only fetch articles based on readeck bookmarks with these labels (comma-separated, empty: all)
Labels = ""

[Sync]
# if an article is completed on your kobo
# it will be marked as archived on Readeck
Archive = true
# Articles in the following collection
# will be set as favourite in Readeck
# (empty: disabled)
FavouriteCollection = ""

[Log]
# Path to log file on Kobo device (empty = stdout only)
Path = "/mnt/onboard/.kobodeck.log"
Verbose = false
# Max log size in KB
Size = 200

[Output]
# Directory to store downloaded (K)EPUB files
# If it does not exist, it will be created
Path = "/mnt/onboard/kobodeck"
# Delete local EPUBs that are no longer in the unread feed
Delete = false
